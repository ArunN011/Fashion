<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealer Orders</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#eef1f7;
}

.content{
    padding:30px;
}

.orders{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#233f7a;
    color:white;
    padding:15px;
}

table td{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.status-success{
    color:green;
    font-weight:600;
}

.status-pending{
    color:orange;
    font-weight:600;
}

.status-shipped{
    color:#007bff;
    font-weight:600;
}

.back-btn{
    margin-top:20px;
    background:#233f7a;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
    margin:25px 0;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    margin-bottom:0;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

@media(max-width:768px){

    .cards{
        display:grid;
        grid-template-columns:1fr;
        gap:20px;
    }

    .card{
        margin:0;
        padding:25px;
    }

}


</style>

</head>

<body>

<div class="content">

<div class="welcome">
<h2>Dealer Orders</h2>
</div>

<div class="cards">

<div class="card">
<h3>520</h3>
<p>Total Orders</p>
</div>

<div class="card">
<h3>120</h3>
<p>Pending Orders</p>
</div>

<div class="card">
<h3>350</h3>
<p>Delivered Orders</p>
</div>

<div class="card">
<h3>50</h3>
<p>Returned Orders</p>
</div>

</div>

<div class="orders">

<h2>Recent Orders</h2>

<table>

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Product</th>
<th>Status</th>
<th>Amount</th>
</tr>

<tr>
<td>#1001</td>
<td>Rahul</td>
<td>Premium Jacket</td>
<td class="status-success">Delivered</td>
<td>₹2499</td>
</tr>

<tr>
<td>#1002</td>
<td>Priya</td>
<td>Running Shoes</td>
<td class="status-pending">Processing</td>
<td>₹3999</td>
</tr>

<tr>
<td>#1003</td>
<td>Kiran</td>
<td>Luxury Watch</td>
<td class="status-shipped">Shipped</td>
<td>₹1999</td>
</tr>

</table>

<button class="back-btn"
onclick="window.location.href='dealer-dashboard.html'">
← Back To Dashboard
</button>

</div>

</div>

</body>
</html>
